# ─── APP3 ────────────────────────────────────────────────────────────────────
# Questa è l'applicazione di DEFAULT: viene servita quando il client non
# manda un HOST riconosciuto (né app1.com né app2.com).
# La regola default nell'Ingress punta a questo service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3
  namespace: apps
  labels:
    app: app3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app3
  template:
    metadata:
      labels:
        app: app3
    spec:
      containers:
      - name: app3
        image: nginxdemos/hello
        ports:
        - containerPort: 80
---
# Service ClusterIP: espone app3 internamente al cluster su porta 80.
# Usato come defaultBackend nell'Ingress per le richieste senza HOST specifico.
apiVersion: v1
kind: Service
metadata:
  name: app3-service
  namespace: apps
spec:
  selector:
    app: app3
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
