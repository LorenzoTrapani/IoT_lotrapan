# ─── APP1 ────────────────────────────────────────────────────────────────────
# Raggiungibile tramite Ingress quando il client manda HOST: app1.com
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  namespace: apps
  labels:
    app: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
      - name: app1
        image: nginxdemos/hello
        ports:
        - containerPort: 80
---
# Service ClusterIP: espone app1 internamente al cluster su porta 80.
# L'Ingress usa questo Service come backend (app1-service:80 -> pod:5000).
apiVersion: v1
kind: Service
metadata:
  name: app1-service
  namespace: apps
spec:
  selector:
    app: app1
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
